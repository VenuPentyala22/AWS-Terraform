name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-deploy.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy
      environment:
        description: "Target environment (must match a GitHub environment + envs/<env>.tfvars + backend-config/<env>.hcl)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      aws_region:
        description: "AWS region"
        required: false
        default: "us-east-1"
      confirm:
        description: "For destroy: type the environment name to confirm."
        required: false
        default: ""

env:
  TF_VERSION: "1.10.5"
  TF_WORKING_DIR: "./terraform"

# Serialize deploys to the same environment. State lock would catch this too,
# but failing fast in CI is better than waiting on a stale lock.
concurrency:
  group: terraform-deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Terraform ${{ github.event.inputs.action || 'apply' }} (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    env:
      TF_ENV: ${{ github.event.inputs.environment || 'dev' }}
      AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}

    steps:
      - name: Validate destroy confirmation
        if: github.event.inputs.action == 'destroy'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.environment }}" ]; then
            echo "::error::Destroy requires the 'confirm' input to equal the environment name (${{ github.event.inputs.environment }})."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve init/plan flags
        id: flags
        run: |
          set -euo pipefail
          backend_file="backend-config/${TF_ENV}.hcl"
          tfvars_file="envs/${TF_ENV}.tfvars"

          if [ ! -f "${backend_file}" ]; then
            echo "::error::Missing backend config file: ${TF_WORKING_DIR}/${backend_file}"
            exit 1
          fi
          if [ ! -f "${tfvars_file}" ]; then
            echo "::error::Missing tfvars file: ${TF_WORKING_DIR}/${tfvars_file}"
            exit 1
          fi

          {
            echo "backend=-backend-config=${backend_file}"
            echo "tfvars=-var-file=${tfvars_file}"
          } >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: terraform init -input=false ${{ steps.flags.outputs.backend }}

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy'
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -lock-timeout=5m \
            ${{ steps.flags.outputs.tfvars }} \
            -out=tfplan

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event.inputs.action == 'apply'
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            -lock-timeout=5m \
            tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: |
          terraform destroy \
            -input=false \
            -auto-approve \
            -lock-timeout=5m \
            ${{ steps.flags.outputs.tfvars }}

      - name: Show Outputs
        if: github.event.inputs.action != 'destroy'
        run: terraform output -no-color
