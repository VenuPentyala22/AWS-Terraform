name: Terraform PR Check

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-pr-check.yml"

env:
  TF_VERSION: "1.7.0"
  TF_WORKING_DIR: "./terraform"
  AWS_REGION: "us-east-1"
  # Convention: backend config per env lives at terraform/backend-config/<env>.hcl
  BACKEND_CONFIG_FILE: "backend-config/dev.hcl"
  TFVARS_FILE: "envs/dev.tfvars"

# Cancel superseded runs when a PR is updated.
concurrency:
  group: terraform-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate & Plan
    runs-on: ubuntu-latest
    environment: development

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve init/plan flags
        id: flags
        run: |
          set -euo pipefail
          backend_flag=""
          if [ -f "${BACKEND_CONFIG_FILE}" ]; then
            backend_flag="-backend-config=${BACKEND_CONFIG_FILE}"
          fi
          tfvars_flag=""
          if [ -f "${TFVARS_FILE}" ]; then
            tfvars_flag="-var-file=${TFVARS_FILE}"
          elif [ -f "terraform.tfvars" ]; then
            tfvars_flag="-var-file=terraform.tfvars"
          fi
          {
            echo "backend=${backend_flag}"
            echo "tfvars=${tfvars_flag}"
          } >> "$GITHUB_OUTPUT"

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: terraform init -input=false ${{ steps.flags.outputs.backend }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -lock-timeout=5m \
            ${{ steps.flags.outputs.tfvars }} \
            -out=tfplan

      - name: Post Plan to PR
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const MAX = 60000; // stay under GitHub's 65536 comment limit
            const raw = process.env.PLAN_STDOUT || '';
            const truncated = raw.length > MAX
              ? raw.slice(0, MAX) + `\n\n... (truncated ${raw.length - MAX} chars — see workflow logs)`
              : raw;

            const body = [
              `#### Terraform Format 🖌 \`${{ steps.fmt.outcome }}\``,
              `#### Terraform Init ⚙️ \`${{ steps.init.outcome }}\``,
              `#### Terraform Validate 🤖 \`${{ steps.validate.outcome }}\``,
              `#### Terraform Plan 📖 \`${{ steps.plan.outcome }}\``,
              ``,
              `<details><summary>Show Plan</summary>`,
              ``,
              '```terraform',
              truncated,
              '```',
              ``,
              `</details>`,
              ``,
              `*Pushed by: @${{ github.actor }}, Working dir: \`${{ env.TF_WORKING_DIR }}\`*`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
